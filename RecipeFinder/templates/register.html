{% extends "base.html" %}

{% block title %}Recipe Finder | Register{% endblock %}

{% block content %}
<section class="auth-page">
    <form class="auth-form" action="{{ url_for('register') }}" method="POST">
        <p class="eyebrow">New Account</p>
        <h1>Register</h1>
        <p>Create a username and password to protect your saved recipe data.</p>

        <label for="username">Username</label>
        <input id="username" type="text" name="username" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="new-password" required>

        <button type="submit">Create Account</button>
        <a class="button button-light" href="{{ url_for('guest') }}">Continue as Guest</a>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in here</a>.</p>
    </form>
</section>
{% endblock %}
