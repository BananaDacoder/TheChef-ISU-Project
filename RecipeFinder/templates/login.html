{% extends "base.html" %}

{% block title %}Recipe Finder | Log In{% endblock %}

{% block content %}
<section class="auth-page">
    <form class="auth-form" action="{{ url_for('login') }}" method="POST">
        <p class="eyebrow">Account Access</p>
        <h1>Log in</h1>
        <p>Use your account to see your saved recipes and search history.</p>

        <label for="username">Username</label>
        <input id="username" type="text" name="username" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required>

        <button type="submit">Log In</button>
        <a class="button button-light" href="{{ url_for('guest') }}">Continue as Guest</a>
        <p class="auth-switch">Need an account? <a href="{{ url_for('register') }}">Register here</a>.</p>
    </form>
</section>
{% endblock %}
